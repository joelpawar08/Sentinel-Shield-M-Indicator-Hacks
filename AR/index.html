<!DOCTYPE html>
<html>
<head>
    <title>AR.js A-Frame Location-based (15 Coordinates)</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script type='text/javascript' src='https://raw.githack.com/AR-js-org/AR.js/3.4.5/three.js/build/ar-threex-location-only.js'></script>
    <script type='text/javascript' src='https://raw.githack.com/AR-js-org/AR.js/3.4.5/aframe/build/aframe-ar.js'></script>
</head>
<body>
    <a-scene vr-mode-ui="enabled: false" arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false" renderer="antialias: true; alpha: true">
        <!-- AR Camera -->
        <a-camera gps-new-camera="gpsMinDistance: 5"></a-camera>

        <!-- Replace spheres with pointer.glb -->
       
        <a-entity gltf-model="pointer.glb" gps-new-entity-place="latitude: 19.022361 ; longitude: 72.855744" scale="6 6 6"></a-entity>
        <a-entity gltf-model="pointer.glb" gps-new-entity-place="latitude: 19.022597 ; longitude: 72.855803" scale="6 6 6"></a-entity>
        <a-entity gltf-model="pointer.glb" gps-new-entity-place="latitude: 19.022611 ; longitude: 72.855722" scale="6 6 6"></a-entity>
        <a-entity gltf-model="pointer.glb" gps-new-entity-place="latitude: 19.022903 ; longitude: 72.855734" scale="6 6 6"></a-entity>
       
       
       
       
    </a-scene>
</body>
</html>
